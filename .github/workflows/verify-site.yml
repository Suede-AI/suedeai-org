name: verify-site

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify-source:
    name: Source verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run python3 tests/verify_site.py
        run: python3 tests/verify_site.py

  smoke-deployed:
    name: Deployed smoke test
    runs-on: ubuntu-latest
    needs: verify-source
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Curl the deployed marketing root
        env:
          TARGET_URL: "https://suedeai-org.vercel.app/"
        run: |
          set -euo pipefail

          echo "Probing $TARGET_URL"

          # Vercel deploys take 30-120s to propagate after push, and the smoke test
          # is checking the deploy from THIS push. Retry until the new SEO markers
          # are present (or budget exhausted), not just until we get HTTP 200.
          attempt=1
          max_attempts=10
          sleep_between=20
          status=""
          body_file="$(mktemp)"
          headers_file="$(mktemp)"
          ready=false

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Attempt $attempt of $max_attempts"
            # Cache-bust query so the edge CDN can't serve a stale object that
            # predates the deploy we're verifying. Also send no-cache headers.
            bust="$(date +%s%N)-${RANDOM}"
            status="$(curl -sS -L \
              -A "suedeai-org-ci/1.0 (+github-actions verify-site)" \
              -H "Cache-Control: no-cache" \
              -H "Pragma: no-cache" \
              -o "$body_file" \
              -D "$headers_file" \
              -w "%{http_code}" \
              "${TARGET_URL}?ci-verify=${bust}" || true)"

            if [ "$status" = "200" ] \
              && grep -qiE '<title>[^<]+</title>' "$body_file" \
              && grep -qiE '<link[^>]+rel="canonical"' "$body_file" \
              && grep -qiE '<meta[^>]+property="og:' "$body_file" \
              && grep -qiF 'application/ld+json' "$body_file"; then
              ready=true
              break
            fi

            echo "Got HTTP $status, response not fully ready — retrying in ${sleep_between}s"
            attempt=$((attempt + 1))
            sleep "$sleep_between"
          done

          if [ "$ready" != "true" ]; then
            echo "FAIL: $TARGET_URL did not converge to ready state after $max_attempts attempts"
            echo "Last HTTP status: $status"
            echo "---- last response headers ----"
            cat "$headers_file"
            echo "---- presence ----"
            echo "  HTTP 200:         $( [ "$status" = "200" ] && echo yes || echo no )"
            echo "  <title>:          $( grep -qiE '<title>[^<]+</title>' "$body_file" && echo yes || echo no )"
            echo "  canonical link:   $( grep -qiE '<link[^>]+rel="canonical"' "$body_file" && echo yes || echo no )"
            echo "  og: meta:         $( grep -qiE '<meta[^>]+property="og:' "$body_file" && echo yes || echo no )"
            echo "  JSON-LD:          $( grep -qiF 'application/ld+json' "$body_file" && echo yes || echo no )"
            exit 1
          fi

          echo "PASS: 200 + non-empty <title> + canonical + og: + JSON-LD present"
